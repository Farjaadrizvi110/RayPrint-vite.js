    <!-- Custom Styles for Preloader -->
    <style>
      /* Critical CSS for preloader */
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background: #ffffff;
        z-index: 9999;
      }

      /* Smooth scroll */
      html {
        scroll-behavior: smooth;
      }

      /* Selection color */
      ::selection {
        background: rgba(59, 108, 255, 0.15);
        color: #0f172a;
      }

      /* Focus styles */
      :focus-visible {
        outline: 2px solid #3b6cff;
        outline-offset: 2px;
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
